version: "3.9"

services:
  1c-monitor:
    build: .
    container_name: 1c-releases-monitor
    restart: unless-stopped
    
    # Загружаем все переменные из .env
    env_file:
      - .env
    
    volumes:
      - ./data:/data
    
    # === Логирование ===
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      - PYTHONUNBUFFERED=1